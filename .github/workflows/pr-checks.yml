name: Validate pull request

on:
  pull_request:

concurrency:
  group: >-
    ${{ github.workflow }}-${{
      github.event.pull_request.number
      || github.event.merge_group.head_ref
    }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  check-gitlint:
    name: check (gitlint)
    # Do not run this check if the PR has been created by dependabot.
    if: contains(github.event.pull_request.user.login , 'dependabot[bot]') == false
    runs-on: ubuntu-latest

    steps:
      - run: pip install gitlint
      - name: Validate commits messages
        uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const debugEnabled = process.env.ACTIONS_STEP_DEBUG === 'true';
            const pullRequestParams = {
              pull_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            };

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              pullRequestParams
            );

            // Start building the summary
            core.summary
              .addHeading('Gitlint Validation Report', 1)
              .addEOL()
              .addRaw(`**Total commits:** ${commits.length}`, true)
              .addEOL();

            let failedCount = 0;

            for (const data of commits) {
              const commitId = data.sha;
              const commitMessage = data.commit.message;
              const commitTitle = commitMessage.split('\n')[0];

              console.log(`Validating: ${commitId} - ${commitTitle}`);

              // Use temp file for gitlint to handle special characters safely.
              const tempDir = process.env.RUNNER_TEMP || '/tmp';
              const tempFile = path.join(
                tempDir,
                `commit-msg-${Math.random().toString(36).slice(2)}`
              );
              fs.writeFileSync(tempFile, commitMessage);

              const {
                exitCode,
                stderr
              } = await exec.getExecOutput(
                `gitlint`,
                [`--msg-filename`, `${tempFile}`],
                { silent: !debugEnabled, ignoreReturnCode: true }
              );

              if (exitCode === 0) {
                console.log(`✅ PASS`);
                core.summary.addRaw(
                  `- ✅ \`${commitId}\`: ${commitTitle}`,
                  true
                );
              } else {
                console.log(`❌ Failed`);
                console.log(stderr);
                core.summary
                  .addRaw(`- ❌ \`${commitId}\`: ${commitTitle}`, true)
                  .addEOL()
                  .addRaw(`\`\`\``, true)
                  .addRaw(stderr)
                  .addRaw(`\`\`\``, true);
                failedCount++;
              }
            }

            if (failedCount > 0) {
              core.setFailed(
                `Gitlint validation failed for ${failedCount} commit(s).`
              );
            } else {
              core.summary
                .addEOL()
                .addRaw(`All commits passed gitlint validation! 🎉`, true);
            }

            await core.summary.write();

  check-rustfmt:
    name: check (rustfmt)
    runs-on: ubuntu-24.04
    steps:
      - &pr-details
        name: Get PR details
        uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a # v8.0.0
        id: pr-details
        with:
          script: |
            const pullRequestParams = {
              pull_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            };

            const { data: pullRequest } = await github.rest.pulls.get(
              pullRequestParams
            );
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              pullRequestParams
            );

            core.setOutput('fetch-depth', commits.length + 1);
            core.setOutput('total-commits', commits.length);
            core.setOutput('base-ref-sha', pullRequest.base.sha);
            core.setOutput('head-ref-sha', pullRequest.head.sha);

      - &checkout-pr
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: ${{ steps.pr-details.outputs.fetch-depth }}

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: nightly
          components: rustfmt

      - uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a # v8.0.0
        with:
          script: |
            const debugEnabled = process.env.ACTIONS_STEP_DEBUG === 'true';
            const pullRequestParams = {
              pull_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            };

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              pullRequestParams
            );

            // Start building the summary
            core.summary
              .addHeading('Rustfmt Validation Report', 1)
              .addEOL()
              .addRaw(`**Total commits:** ${commits.length}`, true)
              .addEOL();

            let failedCount = 0;

            for (const data of commits) {
              const commitId = data.sha;
              const commitTitle = data.commit.message.split('\n')[0];

              console.log(`Validating: ${commitId} - ${commitTitle}`);
              await exec.exec(
                'git',
                ['checkout', commitId],
                {silent: !debugEnabled}
              );
              const {
                exitCode,
                stdout,
              } = await exec.getExecOutput(
                `cargo`,
                [`+nightly`, `fmt`, `--all`, `--`, `--check`],
                { silent: !debugEnabled, ignoreReturnCode: true }
              );

              if (exitCode === 0) {
                console.log(`✅ PASS`);
                core.summary.addRaw(
                  `- ✅ \`${commitId}\`: ${commitTitle}`,
                  true
                );
              } else {
                console.log(`❌ Failed`);
                console.log(stdout);
                core.summary
                  .addRaw(`- ❌ \`${commitId}\`: ${commitTitle}`, true)
                  .addEOL()
                  .addDetails(`Details`, `\n\n\`\`\`diff\n${stdout}\`\`\`\n`)
                  .addEOL();
                failedCount++;
              }
            }

            if (failedCount > 0) {
              core.setFailed(
                `Rustfmt validation failed for ${failedCount} commit(s).`
              );
            } else {
              core.summary
                .addEOL()
                .addRaw(`All commits passed rustfmt validation! 🎉`, true);
            }

            await core.summary.write();

  check-clippy:
    name: check (clippy)
    permissions:
      checks: write
    runs-on: ubuntu-24.04
    steps:
      - *pr-details
      - *checkout-pr
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: clippy
      - uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a # v8.0.0
        with:
          script: |
            const debugEnabled = process.env.ACTIONS_STEP_DEBUG === 'true';
            const pullRequestParams = {
              pull_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            };

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              pullRequestParams
            );

            // Start building the summary
            core.summary
              .addHeading('Clippy Validation Report', 1)
              .addEOL()
              .addRaw(`**Total commits:** ${commits.length}`, true)
              .addEOL();

            let failedCount = 0;

            for (const data of commits) {
              const commitId = data.sha;
              const commitTitle = data.commit.message.split('\n')[0];

              console.log(`Validating: ${commitId} - ${commitTitle}`);
              await exec.exec(
                'git',
                ['checkout', commitId],
                {silent: !debugEnabled}
              );
              const {
                exitCode,
                stderr,
              } = await exec.getExecOutput(
                `cargo`,
                [
                  `+stable`,
                  `clippy`,
                  `--all-features`,
                  `--color`, `never`,
                  `--workspace`,
                  `--all-targets`,
                  `--`,
                  `-D`,
                  `warnings`,
                ],
                { silent: !debugEnabled, ignoreReturnCode: true }
              );

              if (exitCode === 0) {
                console.log(`✅ PASS`);
                core.summary.addRaw(
                  `- ✅ \`${commitId}\`: ${commitTitle}`,
                  true
                );
              } else {
                console.log(`❌ Failed`);
                console.log(stderr);
                core.summary
                  .addRaw(`- ❌ \`${commitId}\`: ${commitTitle}`, true)
                  .addEOL()
                  .addDetails(`Details`, `\n\n\`\`\`\n${stderr}\`\`\`\n`)
                  .addEOL();
                failedCount++;
              }
            }

            if (failedCount > 0) {
              core.setFailed(
                `Clippy validation failed for ${failedCount} commit(s).`
              );
            } else {
              core.summary
                .addEOL()
                .addRaw(`All commits passed clippy validation! 🎉`, true);
            }

            await core.summary.write();

  check-build:
    name: check (build)
    permissions:
      checks: write
    runs-on: ubuntu-24.04
    steps:
      - *pr-details
      - *checkout-pr
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - env:
          TOTAL_COMMITS: ${{ steps.pr-details.outputs.total-commits }}
          BASE_REF_SHA: ${{ steps.pr-details.outputs.base-ref-sha }}
          HEAD_REF_SHA: ${{ steps.pr-details.outputs.head-ref-sha }}
        run: |
          res=0
          if ! commits=( $(git rev-list --reverse "${BASE_REF_SHA}..${HEAD_REF_SHA}") )
          then
              echo "::error::Failed to get the list of commits to check."
              exit 1
          fi
          {
              echo "# Build Validation Report"
              echo ""
              echo "**Total commits**: ${TOTAL_COMMITS}"
              echo ""
          } > "${GITHUB_STEP_SUMMARY}"

          export RUST_BACKTRACE=1
          export CARGO_TERM_COLOR=always
          export RUSTFLAGS='-D warnings'
          failed_count=0
          error_log=/tmp/error_log.txt

          for commit in "${commits[@]}"
          do
              echo "::group:: check ${commit}"
              git checkout "${commit}"
              if cargo +stable build --all-features --workspace --all-targets 2>&1 | tee "${error_log}"
              then
                  echo "::endgroup::"
                  echo "✅"
                  echo "- ✅ `${commitId}`: ${commitTitle}" > "${GITHUB_STEP_SUMMARY}"
              else
                  echo "::endgroup::"
                  echo "❌ Develop group above for details"
                  {
                      echo "- ❌ `${commitId}`: ${commitTitle}"
                      echo ""
                      echo "<details><summary>Details</summary>"
                      echo ""
                      echo "```"
                      cat "${error_log}"
                      echo "```"
                      echo "</details>"
                  } > "${GITHUB_STEP_SUMMARY}"
                  failed_count=$(( failed_count + 1 ))
              fi
          done

          if [ "${failed_count}" -ne 0 ]
          then
              echo "::error::Build validation failed for ${failed_count} commit(s)."
              exit 1
          fi
          echo "All commits passed build validation! 🎉" > "${GITHUB_STEP_SUMMARY}"

  check-tests:
    name: check (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
      - name: test
        env:
          RUST_BACKTRACE: 1
          CARGO_TERM_COLOR: always
        run: cargo test

  check-prettier:
    name: check (prettier)
    permissions:
      checks: write
    runs-on: ubuntu-24.04
    steps:
      - *pr-details
      - *checkout-pr
      - run: npm -g install prettier
      - uses: actions/github-script@450193c5abd4cdb17ba9f3ffcfe8f635c4bb6c2a # v8.0.0
        with:
          script: |
            const debugEnabled = process.env.ACTIONS_STEP_DEBUG === 'true';
            const pullRequestParams = {
              pull_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            };

            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              pullRequestParams
            );

            // Start building the summary
            core.summary
              .addHeading('Prettier Validation Report', 1)
              .addEOL()
              .addRaw(`**Total commits:** ${commits.length}`, true)
              .addEOL();

            let failedCount = 0;

            for (const data of commits) {
              const commitId = data.sha;
              const commitTitle = data.commit.message.split('\n')[0];

              console.log(`Validating: ${commitId} - ${commitTitle}`);
              await exec.exec(
                'git',
                ['checkout', commitId],
                {silent: !debugEnabled}
              );
              const {
                exitCode,
                stdout,
              } = await exec.getExecOutput(
                `prettier`,
                [
                  `--list-different`,
                  `--no-error-on-unmatched-pattern`,
                  `**/*.yml`, `**/*.yaml`,
                  `**/*.md`, `**/*.markdown`,
                  `**/*.json`,
                ],
                { silent: !debugEnabled, ignoreReturnCode: true }
              );

              if (exitCode === 0) {
                console.log(`✅ PASS`);
                core.summary.addRaw(
                  `- ✅ \`${commitId}\`: ${commitTitle}`,
                  true
                );
              } else {
                console.log(`❌ Failed`);
                console.log(stdout);
                core.summary
                  .addRaw(`- ❌ \`${commitId}\`: ${commitTitle}`, true)
                  .addEOL()
                  .addDetails(
                    `Files with bad formatting`,
                    `\n\n\`\`\`\n${stdout}\`\`\`\n`
                    )
                  .addEOL();
                failedCount++;
              }
            }

            if (failedCount > 0) {
              core.setFailed(
                `Prettier validation failed for ${failedCount} commit(s).`
              );
            } else {
              core.summary
                .addEOL()
                .addRaw(`All commits passed prettier validation! 🎉`, true);
            }

            await core.summary.write();

  merge-checks:
    name: Merge checks
    if: always()
    needs:
      - check-gitlint
      - check-rustfmt
      - check-clippy
      - check-build
      - check-tests
      - check-prettier
    runs-on: ubuntu-latest
    steps:
      - name: Block merge if required checks fail
        if: >-
          ${{
            contains(needs.*.result, 'failure')
            || contains(needs.*.result, 'cancelled')
          }}
        run: exit 1
